name: Sync MetaCubeX .mrs files

on:
  schedule:
    - cron: '0 3 * * *'   # every day at 03:00 UTC
  workflow_dispatch:        # manual run button

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download .mrs files from MetaCubeX
        run: |
          set -e
          BASE="https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta"

          mkdir -p geo/geoip geo/geosite

          # GeoIP (only telegram has geoip)
          for name in telegram; do
            echo "Downloading geoip/$name.mrs ..."
            curl -fsSL "$BASE/geo/geoip/$name.mrs" -o "geo/geoip/$name.mrs"
          done

          # GeoSite
          for name in telegram discord youtube whatsapp tiktok meta facebook instagram; do
            echo "Downloading geosite/$name.mrs ..."
            curl -fsSL "$BASE/geo/geosite/$name.mrs" -o "geo/geosite/$name.mrs"
          done

          # Viber AWS IPs — hardcoded known ranges
          echo "Generating viber_aws_ip.mrs ..."
          cat > viber_aws.txt << 'EOF'
5.28.192.0/18
5.253.84.0/22
31.204.128.0/19
37.252.0.0/17
45.138.228.0/22
46.17.40.0/21
62.109.0.0/19
77.75.144.0/21
149.154.160.0/20
EOF
          curl -fsSL https://github.com/MetaCubeX/mihomo/releases/download/v1.19.9/mihomo-linux-amd64-v1.19.9.deb -o mihomo.deb
          sudo apt install --fix-missing -y ./mihomo.deb 2>/dev/null || true
          mkdir -p other
          mihomo convert-ruleset ipcidr text viber_aws.txt other/viber_aws_ip.mrs
          rm -f viber_aws.txt mihomo.deb

          echo "All files downloaded successfully."

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add geo/
          if git diff --cached --quiet; then
            echo "No changes, skipping commit."
          else
            git commit -m "Sync MetaCubeX .mrs $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
